<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Projects — HRC.HSB.EDU.VN</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body data-page="admin-all">

  <nav class="navbar">
    <a class="navbar-brand" href="../index.html">
      ResearchHub
    </a>
    <ul class="navbar-nav">
      <li><a href="../index.html">Public Site ↗</a></li>
      <li><button class="btn btn-danger btn-sm" onclick="handleLogout()">Logout</button></li>
    </ul>
  </nav>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-logo">Admin Panel</div>
      <ul class="sidebar-menu">
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="pending.html">Pending Review</a></li>
        <li><a href="all-projects.html" class="active">All Projects</a></li>
        <li><a href="users.html">User Management</a></li>
        <li><a href="../index.html" target="_blank">Public Site</a></li>
        <li><a href="#" onclick="handleLogout();return false;">Logout</a></li>
      </ul>
    </aside>

    <main class="admin-content">
      <div class="flex justify-between align-center mb-2">
        <h1 style="margin-bottom:0">All Projects <span id="all-count" style="font-size:1rem; color:var(--muted); font-weight:400"></span></h1>
        <a href="dashboard.html" class="btn btn-outline btn-sm">← Dashboard</a>
      </div>

      <!-- Filters -->
      <div class="filter-bar mb-2" style="margin-bottom:1.2rem;">
        <div class="filter-group" style="flex:2 1 220px;">
          <label for="admin-search">Search</label>
          <input type="text" id="admin-search" class="form-control" placeholder="Title, supervisor, category…" />
        </div>
        <div class="filter-group">
          <label for="status-filter">Status</label>
          <select id="status-filter" class="form-control">
            <option value="">All Statuses</option>
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>
      </div>

      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Project Title</th>
              <th>Category</th>
              <th>Supervisor</th>
              <th>Status</th>
              <th>Submitted</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="all-tbody">
            <tr><td colspan="6" class="text-center text-muted" style="padding:2rem">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <div id="toast-container"></div>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
