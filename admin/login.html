<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — HRC.HSB.EDU.VN</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body data-page="admin-login">

  <div class="login-wrap">
    <div class="login-card">

      <div class="login-logo">
        <h2>Admin Portal</h2>
        <p>ResearchHub Management System</p>
      </div>

      <div id="login-error" class="alert alert-danger hidden">
        Invalid username or password. Please try again.
      </div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" class="form-control" placeholder="admin" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:.5rem">Sign In</button>
      </form>

      <div style="text-align:center; margin-top:1.5rem; font-size:.85rem; color:var(--muted);">
        <a href="../index.html">← Back to Public Site</a>
      </div>

    </div>
  </div>

  <div id="toast-container"></div>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/data.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
